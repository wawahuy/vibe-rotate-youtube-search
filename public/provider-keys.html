<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Keys — YouTube Rotate API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>if (!localStorage.getItem('admin_token')) window.location.href = '/index.html';</script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex">

  <!-- Sidebar (same structure) -->
  <aside class="w-56 bg-slate-800 border-r border-slate-700 flex flex-col min-h-screen fixed">
    <div class="px-5 py-5 border-b border-slate-700">
      <h1 class="font-bold text-white text-base">YT Rotate API</h1>
      <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
    </div>
    <nav class="flex-1 py-4 space-y-1 px-3">
      <a href="/dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/></svg>
        Dashboard
      </a>
      <a href="/provider-keys.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-slate-700 text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Provider Keys
      </a>
      <a href="/user-keys.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        User API Keys
      </a>
      <a href="/report.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Reports
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-700">
      <button id="logout-btn" class="w-full flex items-center gap-2 px-3 py-2 text-slate-400 hover:text-red-400 text-sm rounded-lg hover:bg-slate-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <main class="ml-56 flex-1 p-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-white">Provider API Keys</h2>
      <button id="add-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors">
        + Add Key
      </button>
    </div>

    <!-- Filter -->
    <div class="flex gap-2 mb-4">
      <select id="filter-provider" class="px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-slate-300 text-sm">
        <option value="">All providers</option>
        <option value="youtube">YouTube</option>
        <option value="serpapi">SerpAPI</option>
      </select>
      <button id="filter-btn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg transition-colors">Filter</button>
    </div>

    <!-- Table -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-700">
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Provider</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Quota Used / Limit</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Reset At</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-slate-400 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody id="keys-table" class="divide-y divide-slate-700">
          <tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md shadow-2xl">
      <div class="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
        <h3 id="modal-title" class="text-base font-semibold text-white">Add Provider Key</h3>
        <button id="modal-close" class="text-slate-400 hover:text-white">✕</button>
      </div>
      <form id="key-form" class="px-6 py-5 space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">API Key (plain text)</label>
          <input id="f-key" type="password" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Paste your API key…" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Provider</label>
          <select id="f-provider" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white text-sm">
            <option value="youtube">YouTube Data API</option>
            <option value="serpapi">SerpAPI</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Name (optional)</label>
          <input id="f-name" type="text" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="e.g. Project A key" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Quota Limit</label>
          <input id="f-quota" type="number" min="1" value="10000" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
        </div>
        <div id="form-error" class="hidden text-red-400 text-sm"></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors">Save</button>
          <button type="button" id="form-cancel" class="flex-1 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium rounded-lg transition-colors">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('admin_token'); window.location.href = '/index.html'; });

    let keys = [];
    const modal = document.getElementById('modal');
    const closeModal = () => modal.classList.add('hidden');
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('form-cancel').addEventListener('click', closeModal);

    async function loadKeys() {
      const provider = document.getElementById('filter-provider').value;
      const qs = provider ? `?provider=${provider}` : '';
      keys = await API.get(`/provider-keys${qs}`);
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('keys-table');
      if (!keys.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">No provider keys yet. Add one to get started.</td></tr>';
        return;
      }
      tbody.innerHTML = keys.map(k => {
        const pct = k.quotaLimit ? Math.round((k.quotaUsed / k.quotaLimit) * 100) : 0;
        const barColor = pct >= 90 ? 'bg-red-500' : pct >= 70 ? 'bg-amber-500' : 'bg-emerald-500';
        return `
          <tr class="hover:bg-slate-700/30">
            <td class="px-6 py-3">
              <span class="px-2 py-0.5 rounded text-xs font-semibold ${k.provider === 'youtube' ? 'bg-red-900 text-red-300' : 'bg-blue-900 text-blue-300'}">${k.provider}</span>
            </td>
            <td class="px-6 py-3 text-slate-300">${k.name || '—'}</td>
            <td class="px-6 py-3">${statusBadge(k.status)}</td>
            <td class="px-6 py-3">
              <div class="flex items-center gap-2">
                <div class="flex-1 bg-slate-700 rounded-full h-1.5 w-24">
                  <div class="${barColor} h-1.5 rounded-full" style="width:${Math.min(pct,100)}%"></div>
                </div>
                <span class="text-slate-400 text-xs">${formatNumber(k.quotaUsed)} / ${formatNumber(k.quotaLimit)}</span>
              </div>
            </td>
            <td class="px-6 py-3 text-slate-400 text-xs">${k.resetAt ? formatDate(k.resetAt) : '—'}</td>
            <td class="px-6 py-3 text-right space-x-2">
              ${k.status === 'disabled'
                ? `<button onclick="activateKey('${k._id}')" class="text-xs px-3 py-1 bg-emerald-700 hover:bg-emerald-600 text-white rounded-lg transition-colors">Activate</button>`
                : `<button onclick="deactivateKey('${k._id}')" class="text-xs px-3 py-1 bg-amber-700 hover:bg-amber-600 text-white rounded-lg transition-colors">Deactivate</button>`
              }
              <button onclick="resetKey('${k._id}')" class="text-xs px-3 py-1 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg transition-colors">Reset</button>
              <button onclick="editKey('${k._id}')" class="text-xs px-3 py-1 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg transition-colors">Edit</button>
              <button onclick="deleteKey('${k._id}')" class="text-xs px-3 py-1 bg-red-900/40 hover:bg-red-900/70 text-red-300 rounded-lg transition-colors">Delete</button>
            </td>
          </tr>`;
      }).join('');
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      document.getElementById('edit-id').value = '';
      document.getElementById('modal-title').textContent = 'Add Provider Key';
      document.getElementById('f-key').required = true;
      document.getElementById('f-key').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-quota').value = '10000';
      document.getElementById('form-error').classList.add('hidden');
      modal.classList.remove('hidden');
    });

    function editKey(id) {
      const key = keys.find(k => k._id === id);
      if (!key) return;
      document.getElementById('edit-id').value = id;
      document.getElementById('modal-title').textContent = 'Edit Provider Key';
      document.getElementById('f-key').required = false;
      document.getElementById('f-key').value = '';
      document.getElementById('f-provider').value = key.provider;
      document.getElementById('f-name').value = key.name || '';
      document.getElementById('f-quota').value = key.quotaLimit;
      document.getElementById('form-error').classList.add('hidden');
      modal.classList.remove('hidden');
    }

    async function deactivateKey(id) {
      if (!confirm('Deactivate this key?')) return;
      try {
        await API.post(`/provider-keys/${id}/disable`);
        toast('Key deactivated');
        loadKeys();
      } catch (err) { toast(err.message, 'error'); }
    }

    async function activateKey(id) {
      if (!confirm('Re-activate this key?')) return;
      try {
        await API.post(`/provider-keys/${id}/activate`);
        toast('Key activated');
        loadKeys();
      } catch (err) { toast(err.message, 'error'); }
    }

    async function resetKey(id) {
      if (!confirm('Reset quota and re-activate this key?')) return;
      try {
        await API.post(`/provider-keys/${id}/reset`);
        toast('Key reset successfully');
        loadKeys();
      } catch (err) { toast(err.message, 'error'); }
    }

    async function deleteKey(id) {
      if (!confirm('Delete this key? This cannot be undone.')) return;
      try {
        await API.delete(`/provider-keys/${id}`);
        toast('Key deleted');
        loadKeys();
      } catch (err) { toast(err.message, 'error'); }
    }

    document.getElementById('key-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const errEl = document.getElementById('form-error');
      errEl.classList.add('hidden');
      const body = {
        provider: document.getElementById('f-provider').value,
        name: document.getElementById('f-name').value || undefined,
        quotaLimit: parseInt(document.getElementById('f-quota').value, 10),
      };
      const keyVal = document.getElementById('f-key').value;
      if (keyVal) body.key = keyVal;
      try {
        if (id) {
          await API.put(`/provider-keys/${id}`, body);
          toast('Key updated');
        } else {
          if (!keyVal) { errEl.textContent = 'API key is required'; errEl.classList.remove('hidden'); return; }
          await API.post('/provider-keys', body);
          toast('Key added');
        }
        closeModal();
        loadKeys();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    document.getElementById('filter-btn').addEventListener('click', loadKeys);
    loadKeys();
  </script>
</body>
</html>
