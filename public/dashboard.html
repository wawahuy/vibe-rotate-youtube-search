<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — YouTube Rotate API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (!localStorage.getItem('admin_token')) window.location.href = '/index.html';
  </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-slate-800 border-r border-slate-700 flex flex-col min-h-screen fixed">
    <div class="px-5 py-5 border-b border-slate-700">
      <h1 class="font-bold text-white text-base">YT Rotate API</h1>
      <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
    </div>
    <nav class="flex-1 py-4 space-y-1 px-3">
      <a href="/dashboard.html" data-page="dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors bg-slate-700 text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/></svg>
        Dashboard
      </a>
      <a href="/provider-keys.html" data-page="provider-keys" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-700 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Provider Keys
      </a>
      <a href="/user-keys.html" data-page="user-keys" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-700 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        User API Keys
      </a>
      <a href="/report.html" data-page="report" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-700 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Reports
      </a>
      <a href="/test.html" data-page="test" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-700 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v11.5a3.5 3.5 0 007 0V3M6 3h12M5 20h14"/></svg>
        API Test
      </a>
      <a href="/config.html" data-page="config" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-700 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Config
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-700">
      <button id="logout-btn" class="w-full flex items-center gap-2 px-3 py-2 text-slate-400 hover:text-red-400 text-sm rounded-lg hover:bg-slate-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="ml-56 flex-1 p-8">
    <h2 class="text-xl font-bold text-white mb-6">Dashboard</h2>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Requests Today</p>
        <p id="stat-today" class="text-3xl font-bold text-white mt-2">—</p>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Total Requests</p>
        <p id="stat-total" class="text-3xl font-bold text-white mt-2">—</p>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">YouTube Hits (today)</p>
        <p id="stat-yt" class="text-3xl font-bold text-white mt-2">—</p>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">SerpAPI Hits (today)</p>
        <p id="stat-serp" class="text-3xl font-bold text-white mt-2">—</p>
      </div>
    </div>

    <!-- Recent logs -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-700">
        <h3 class="text-base font-semibold text-white">Recent Activity</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-700">
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Time</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Endpoint</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Provider</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Status</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Query</th>
            </tr>
          </thead>
          <tbody id="recent-logs" class="divide-y divide-slate-700">
            <tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('admin_token');
      window.location.href = '/index.html';
    });

    async function loadDashboard() {
      try {
        const data = await API.get('/report/dashboard');

        document.getElementById('stat-today').textContent = formatNumber(data.todayCount);
        document.getElementById('stat-total').textContent = formatNumber(data.totalCount);

        const ytStat = data.providerStats.find(p => p._id === 'youtube');
        const serpStat = data.providerStats.find(p => p._id === 'serpapi');
        document.getElementById('stat-yt').textContent = formatNumber(ytStat?.count ?? 0);
        document.getElementById('stat-serp').textContent = formatNumber(serpStat?.count ?? 0);

        const tbody = document.getElementById('recent-logs');
        if (!data.recentLogs.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">No activity yet</td></tr>';
          return;
        }
        tbody.innerHTML = data.recentLogs.map(log => `
          <tr class="hover:bg-slate-700/30">
            <td class="px-6 py-3 text-slate-400 whitespace-nowrap">${formatDate(log.timestamp)}</td>
            <td class="px-6 py-3 font-mono text-slate-300">${log.endpoint}</td>
            <td class="px-6 py-3 text-slate-300">${log.providerUsed || '—'}</td>
            <td class="px-6 py-3">${statusBadge(log.status)}</td>
            <td class="px-6 py-3 text-slate-400 truncate max-w-xs">${log.query || '—'}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
