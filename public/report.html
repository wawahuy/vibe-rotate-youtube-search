<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — YouTube Rotate API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>if (!localStorage.getItem('admin_token')) window.location.href = '/index.html';</script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex">

  <aside class="w-56 bg-slate-800 border-r border-slate-700 flex flex-col min-h-screen fixed">
    <div class="px-5 py-5 border-b border-slate-700">
      <h1 class="font-bold text-white text-base">YT Rotate API</h1>
      <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
    </div>
    <nav class="flex-1 py-4 space-y-1 px-3">
      <a href="/dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/></svg>
        Dashboard
      </a>
      <a href="/provider-keys.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Provider Keys
      </a>
      <a href="/user-keys.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        User API Keys
      </a>
      <a href="/report.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-slate-700 text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Reports
      </a>
      <a href="/test.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v11.5a3.5 3.5 0 007 0V3M6 3h12M5 20h14"/></svg>
        API Test
      </a>
      <a href="/config.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Config
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-700">
      <button id="logout-btn" class="w-full flex items-center gap-2 px-3 py-2 text-slate-400 hover:text-red-400 text-sm rounded-lg hover:bg-slate-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <main class="ml-56 flex-1 p-8">
    <h2 class="text-xl font-bold text-white mb-6">Reports</h2>

    <!-- Filters -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 mb-6">
      <div class="flex flex-wrap gap-4 items-end">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">From</label>
          <input id="f-from" type="date" class="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-slate-300 text-sm" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">To</label>
          <input id="f-to" type="date" class="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-slate-300 text-sm" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Provider</label>
          <select id="f-provider" class="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-slate-300 text-sm">
            <option value="">All</option>
            <option value="youtube">YouTube</option>
            <option value="serpapi">SerpAPI</option>
          </select>
        </div>
        <button id="apply-filters" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors">Apply</button>
        <button id="reset-filters" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium rounded-lg transition-colors">Reset</button>
      </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="lg:col-span-2 bg-slate-800 border border-slate-700 rounded-xl p-5">
        <h3 class="text-sm font-semibold text-slate-300 mb-4">Requests Over Time</h3>
        <canvas id="time-chart" height="120"></canvas>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <h3 class="text-sm font-semibold text-slate-300 mb-4">Provider Breakdown</h3>
        <canvas id="provider-chart" height="180"></canvas>
      </div>
    </div>

    <!-- User usage chart -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 mb-6">
      <h3 class="text-sm font-semibold text-slate-300 mb-4">Top User API Keys</h3>
      <canvas id="user-chart" height="80"></canvas>
    </div>

    <!-- Usage logs table -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
        <h3 class="text-base font-semibold text-white">Usage Logs</h3>
        <span id="total-count" class="text-slate-400 text-sm"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-700">
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Time</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Endpoint</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Provider</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">User Key</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Status</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Duration</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase">Query</th>
            </tr>
          </thead>
          <tbody id="logs-table" class="divide-y divide-slate-700">
            <tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="px-6 py-4 border-t border-slate-700 flex items-center justify-between">
        <button id="prev-btn" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg disabled:opacity-40" disabled>← Prev</button>
        <span id="page-info" class="text-slate-400 text-sm">Page 1</span>
        <button id="next-btn" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg disabled:opacity-40">Next →</button>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('admin_token'); window.location.href = '/index.html'; });

    let currentPage = 1;
    let totalPages = 1;
    let timeChart, providerChart, userChart;

    const chartDefaults = {
      color: '#94a3b8',
      borderColor: '#334155',
      backgroundColor: 'rgba(239,68,68,0.15)',
    };

    function toLocalDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function getFilters() {
      const fromVal = document.getElementById('f-from').value;
      const toVal = document.getElementById('f-to').value;
      return {
        from: fromVal ? `${fromVal}T00:00:00.000` : '',
        to: toVal ? `${toVal}T23:59:59.999` : '',
        provider: document.getElementById('f-provider').value,
      };
    }

    // Set default date range: start = 7 days ago 00:00:00, end = today 23:59:59
    const today = new Date();
    const weekAgo = new Date(today);
    weekAgo.setDate(today.getDate() - 7);
    document.getElementById('f-from').value = toLocalDateStr(weekAgo);
    document.getElementById('f-to').value = toLocalDateStr(today);

    async function loadAll() {
      currentPage = 1;
      await Promise.all([loadLogs(), loadCharts()]);
    }

    async function loadCharts() {
      const filters = getFilters();
      const qs = buildQuery(filters);
      const [timeData, providerData, userData] = await Promise.all([
        API.get(`/report/usage/time${qs}`),
        API.get(`/report/provider${qs}`),
        API.get(`/report/user${qs}`),
      ]);
      renderTimeChart(timeData);
      renderProviderChart(providerData);
      renderUserChart(userData);
    }

    function renderTimeChart(data) {
      const ctx = document.getElementById('time-chart').getContext('2d');
      if (timeChart) timeChart.destroy();
      timeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.date),
          datasets: [
            {
              label: 'Total',
              data: data.map(d => d.count),
              borderColor: '#ef4444',
              backgroundColor: 'rgba(239,68,68,0.1)',
              tension: 0.4,
              fill: true,
            },
            {
              label: 'Success',
              data: data.map(d => d.success),
              borderColor: '#10b981',
              backgroundColor: 'transparent',
              tension: 0.4,
              borderDash: [4, 4],
            },
          ],
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, beginAtZero: true },
          },
        },
      });
    }

    function renderProviderChart(data) {
      const ctx = document.getElementById('provider-chart').getContext('2d');
      if (providerChart) providerChart.destroy();
      const colors = { youtube: '#ef4444', serpapi: '#3b82f6', 'yt-dlp': '#8b5cf6', null: '#64748b' };
      providerChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: data.map(d => d.provider || 'None'),
          datasets: [{
            data: data.map(d => d.count),
            backgroundColor: data.map(d => colors[d.provider] || '#64748b'),
            borderColor: '#1e293b',
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } },
        },
      });
    }

    function renderUserChart(data) {
      const ctx = document.getElementById('user-chart').getContext('2d');
      if (userChart) userChart.destroy();
      userChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.keyName || 'Admin'),
          datasets: [{
            label: 'Requests',
            data: data.map(d => d.count),
            backgroundColor: 'rgba(239,68,68,0.6)',
            borderColor: '#ef4444',
            borderWidth: 1,
            borderRadius: 4,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, beginAtZero: true },
          },
        },
      });
    }

    async function loadLogs() {
      const filters = getFilters();
      const qs = buildQuery({ ...filters, page: currentPage, limit: 20 });
      const data = await API.get(`/report/usage${qs}`);
      totalPages = data.totalPages || 1;
      document.getElementById('total-count').textContent = `${formatNumber(data.total)} total`;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;

      const tbody = document.getElementById('logs-table');
      if (!data.data.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500">No logs found for this filter.</td></tr>';
        return;
      }
      tbody.innerHTML = data.data.map(log => {
        const ukName = log.userApiKeyId ? (log.userApiKeyId.name || log.userApiKeyId.key?.slice(0,8) + '…') : 'Admin';
        return `
          <tr class="hover:bg-slate-700/30">
            <td class="px-6 py-2.5 text-slate-400 whitespace-nowrap text-xs">${formatDate(log.timestamp)}</td>
            <td class="px-6 py-2.5 font-mono text-slate-300 text-xs">${log.endpoint}</td>
            <td class="px-6 py-2.5 text-slate-300 text-xs">${log.providerUsed || '—'}</td>
            <td class="px-6 py-2.5 text-slate-400 text-xs">${ukName}</td>
            <td class="px-6 py-2.5">${statusBadge(log.status)}</td>
            <td class="px-6 py-2.5 text-slate-400 text-xs whitespace-nowrap">${log.executionTimeMs != null ? log.executionTimeMs + ' ms' : '—'}</td>
            <td class="px-6 py-2.5 text-slate-400 text-xs truncate max-w-xs">${log.query || '—'}</td>
          </tr>`;
      }).join('');
    }

    document.getElementById('apply-filters').addEventListener('click', loadAll);
    document.getElementById('reset-filters').addEventListener('click', () => {
      document.getElementById('f-from').value = toLocalDateStr(weekAgo);
      document.getElementById('f-to').value = toLocalDateStr(today);
      document.getElementById('f-provider').value = '';
      loadAll();
    });
    document.getElementById('prev-btn').addEventListener('click', () => { currentPage--; loadLogs(); });
    document.getElementById('next-btn').addEventListener('click', () => { currentPage++; loadLogs(); });

    loadAll();
  </script>
</body>
</html>
